name: Build Windows EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install customtkinter pyinstaller pillow
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --add-data "luk.png;." --add-data "mech.png;." --add-data "nozh.png;." --add-data "zelie.png;." main.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Version
          path: dist/main.exe
